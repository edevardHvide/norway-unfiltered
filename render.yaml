services:
  - type: web
    name: norway-unfiltered
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    autoDeploy: true
    branch: main
    repo: https://github.com/edevardHvide/norway-unfiltered
